<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JY's ASMR 视频收录站</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="page-header">
        <div class="container">
            <h1 class="site-title">JY's ASMR 视频收录库</h1>
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="输入视频名称搜索..."
                    autocomplete="off"
                >
            </div>
        </div>
    </header>

    <main class="page-main">
        <div class="container">
            <div id="statusTip" class="status-tip">正在加载视频数据...</div>
            <div id="videoGrid" class="video-grid"></div>
        </div>
    </main>

    <footer class="page-footer">
        <div class="container">
            <p>© 2024 JY's ASMR 视频收录站 | 基于GitHub Pages构建</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
