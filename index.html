<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASMR视频收录站</title>
    <!-- 引入样式文件 相对路径 避免GitHub Pages 404 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 页面头部 模块化 可扩展导航/分类 -->
    <header class="page-header">
        <div class="container">
            <h1 class="site-title">ASMR视频收录库</h1>
            <!-- 搜索框 检索核心功能 -->
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="输入视频名称搜索..."
                    autocomplete="off"
                >
            </div>
        </div>
    </header>

    <!-- 主内容区 视频列表容器 -->
    <main class="page-main">
        <div class="container">
            <!-- 加载/空状态提示 -->
            <div id="statusTip" class="status-tip">正在加载视频数据...</div>
            <!-- 视频卡片网格 -->
            <div id="videoGrid" class="video-grid"></div>
        </div>
    </main>

    <!-- 页脚 可扩展版权/统计信息 -->
    <footer class="page-footer">
        <div class="container">
            <p>© 2024 ASMR视频收录站 | 基于GitHub Pages构建</p>
        </div>
    </footer>

    <!-- 引入JS逻辑 模块化拆分 -->
    <script src="main.js"></script>
</body>
</html>
